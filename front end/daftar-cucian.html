<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FREZZ LAUNDRY | Daftar Cucian</title>
    <link rel="stylesheet" href="./style.css" />
    <script type="module" src="./daftar-cucian.js"></script>
  </head>
  <body class="app-body">
    <div class="app-shell">
      <aside id="sidebar" class="sidebar"></aside>
      <main class="main-content">
        <header class="page-header">
          <div id="pageHeading"></div>
        </header>
        <section id="messageBox"></section>
        <section class="content-grid two-cols">
          <article class="card">
            <div class="card-head">
              <div>
                <h3 class="card-title">Transaksi Aktif</h3>
                <p class="card-copy">Ubah status cucian dan lihat transaksi aktif.</p>
              </div>
            </div>
            <div class="table-wrap">
              <table class="table">
                <thead>
                  <tr>
                    <th>Kode</th>
                    <th>Nama</th>
                    <th>Layanan</th>
                    <th>Status</th>
                    <th>Total</th>
                    <th>Aksi</th>
                  </tr>
                </thead>
                <tbody id="ordersTableBody"></tbody>
              </table>
            </div>
          </article>

          <article class="card">
            <div class="card-head">
              <div>
                <h3 class="card-title">Detail Transaksi</h3>
                <p class="card-copy">Klik detail untuk melihat item dan informasi pembayaran.</p>
              </div>
            </div>
            <div id="detailPanel" class="empty-state">Belum ada transaksi dipilih.</div>
          </article>
        </section>
      </main>
    </div>
  </body>
</html>
